<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SINGING REGISTRATION - WALLA / HEESAY</title>

<style>
body{
  background:black;
  color:white;
  font-family:Poppins, sans-serif;
  padding:40px;
  line-height:1.6;
}

h1,h2{
  color:gold;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  background:#111;
  padding:40px;
  border-radius:15px;
  border:2px solid gold;
  box-shadow:0 0 30px rgba(255,215,0,0.4);
}

.description{
  background:#000;
  border:1px solid gold;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  color:gold;
  font-weight:bold;
  text-align:center;
}

.rules-button{
  display:block;
  text-align:center;
  padding:12px;
  background:transparent;
  border:1px solid gold;
  color:gold;
  border-radius:30px;
  text-decoration:none;
  margin-bottom:30px;
  transition:0.3s;
}

.rules-button:hover{
  background:gold;
  color:black;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  margin-bottom:20px;
  border-radius:8px;
  border:1px solid gold;
  background:black;
  color:white;
}

label{
  font-weight:bold;
  color:gold;
}

.checkbox-area{
  margin:20px 0;
  background:#000;
  padding:15px;
  border-radius:10px;
  border:1px solid gold;
}

.checkbox-area input{
  width:auto;
  margin-right:10px;
}

.button-wa{
  display:inline-block;
  padding:14px 30px;
  background:linear-gradient(90deg,gold,orange);
  color:black;
  font-weight:bold;
  border-radius:40px;
  border:none;
  cursor:pointer;
  transition:0.3s;
  width:100%;
}

.button-wa:hover{
  transform:scale(1.05);
}

.footer{
  margin-top:40px;
  text-align:center;
  color:gold;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🎤 SINGING REGISTRATION</h1>
<h2>CHASTE DRAGON SQUAD</h2>
<h2>WALLA / HEESAY DIVISION</h2>

<hr style="border:1px solid gold;margin:30px 0;">

<div class="description">
MOHON MEMBACA DAN MEMAHAMI SELURUH PERATURAN SEBELUM MENDAFTAR.  
Dengan mendaftar berarti Anda siap mengikuti event singing di Walla / Heesay.
</div>

<a href="sing-walla-heesay-rules.html" class="rules-button">
📜 BACA PERATURAN
</a>

<form id="formWalla">

<label>Pilih Admin</label>
<select id="admin" required>
  <option value="">-- Pilih Admin --</option>
  <option value="6285191295022">Admin Jessica</option>
  <option value="6288291996193">Admin Panda</option>
  <option value="6282246142678">Admin Surya</option>
  <option value="6283126442689">Admin Rara</option>
</select>

<label>Full Name</label>
<input type="text" id="nama" required>

<label>Age</label>
<input type="number" id="umur" required>

<label>From</label>
<input type="text" id="asal" required>

<label>Name Group Sing</label>
<input type="text" id="groupname" required>

<label>How many people are there in the group?</label>
<input type="number" id="jumlah" required>

<label>What song will you sing?</label>
<input type="text" id="lagu" required>

<label>Link Account Walla-Heesay</label>
<input type="text" id="link" required>

<label>
Link Group Sing  
<span style="font-size:12px;color:#ccc;">
(information: Your Group Sing, if don't have make sure to create and make group sing)
</span>
</label>
<input type="text" id="linkgroup" required>

<div class="checkbox-area">
  <input type="checkbox" id="setuju">
  <label for="setuju">
  Saya menyatakan sudah membaca dan menyetujui seluruh peraturan.
  </label>
</div>

<button type="submit" class="button-wa">
KIRIM PENDAFTARAN VIA WHATSAPP
</button>

</form>

<div class="footer">
OFFICIAL SINGING REGISTRATION 2026<br>
© CHASTE DRAGON
</div>

</div>

<script>
document.getElementById("formWalla").addEventListener("submit", function(e){
  e.preventDefault();

  if(!document.getElementById("setuju").checked){
    alert("Anda harus menyetujui peraturan terlebih dahulu!");
    return;
  }

  let admin = document.getElementById("admin").value;
  let nama = document.getElementById("nama").value;
  let umur = document.getElementById("umur").value;
  let asal = document.getElementById("asal").value;
  let groupname = document.getElementById("groupname").value;
  let jumlah = document.getElementById("jumlah").value;
  let lagu = document.getElementById("lagu").value;
  let link = document.getElementById("link").value;
  let linkgroup = document.getElementById("linkgroup").value;

  let pesan = `Halo Admin, saya ingin mendaftar Singing Event WALLA / HEESAY.

Full Name: ${nama}
Age: ${umur}
From: ${asal}
Name Group Sing: ${groupname}
Total Members: ${jumlah}
Song: ${lagu}
Link Account: ${link}
Link Group Sing: ${linkgroup}`;

  let url = "https://wa.me/" + admin + "?text=" + encodeURIComponent(pesan);

  window.open(url, "_blank");
});
</script>

<br><br>
<a href="sing-walla-heesay.html" style="color:gold;">⬅ Kembali</a>

</body>
</html>
