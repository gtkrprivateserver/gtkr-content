<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<title>SINGING REGISTRATION - WALLA / HEESAY</title><style>

  max-width:900px;

  background:#000;

  border-radius:10px;

  text-align:center;
}

.rules-button{
  display:block;

  padding:12px;

}

.rules-button:hover{
  background:gold;

}

.translate-btn{
  display:block;

}

  width:100%;

label{

}

  margin:20px 0;
  background:#000;
  padding:15px;

  border:1px solid gold;
}

.checkbox-area input{
  width:auto;
  margin-right:10px;
}

  display:inline-block;

</style></head><body><div class="container"><h1 id="title1">🎤 SINGING REGISTRATION</h1>
<h2>CHASTE DRAGON SQUAD</h2>
<h2>WALLA / HEESAY DIVISION</h2><button class="translate-btn" onclick="toggleLang()" id="btnTranslate">🌐 Translate: EN</button>

<hr style="border:1px solid gold;margin:30px 0;"><div class="description" id="descText">
MOHON MEMBACA DAN MEMAHAMI SELURUH PERATURAN SEBELUM MENDAFTAR.  
Dengan mendaftar berarti Anda siap mengikuti event singing di Walla / Heesay.
</div><a href="sing-walla-heesay-rules.html" class="rules-button" id="rulesBtn">
📜 BACA PERATURAN
</a><form id="formWalla"><label id="lblAdmin">Pilih Admin</label> <select id="admin" required>

  <option value="">-- Pilih Admin --</option>
  <option value="6285191295022">Admin Jessica</option>
  <option value="6288291996193">Admin Panda</option>
  <option value="6282246142678">Admin Surya</option>
  <option value="6283126442689">Admin Rara</option>
</select><label id="lblNama">Full Name</label> <input type="text" id="nama" required>

<label id="lblUmur">Age</label> <input type="number" id="umur" required>

<label id="lblAsal">From</label> <input type="text" id="asal" required>

<label id="lblGroup">Name Group Sing</label> <input type="text" id="groupname" required>

<label id="lblJumlah">How many people are there in the group?</label> <input type="number" id="jumlah" required>

<label id="lblMember">Name Member Group</label> <input type="text" id="membergroup" required>

<label id="lblLagu">What song will you sing?</label> <input type="text" id="lagu" required>

<label id="lblLink">Link Account Walla-Heesay</label> <input type="text" id="link" required>

<label id="lblLinkGroup">
Link Group Sing  
<span id="infoGroup" style="font-size:12px;color:#ccc;">
(information: Your Group Sing, if don't have make sure to create and make group sing)
</span>
</label>
<input type="text" id="linkgroup" required><div class="checkbox-area">
  <input type="checkbox" id="setuju">
  <label for="setuju" id="lblAgree">
  Saya menyatakan sudah membaca dan menyetujui seluruh peraturan.
  </label>
</div><button type="submit" class="button-wa" id="btnSubmit">
KIRIM PENDAFTARAN VIA WHATSAPP
</button></form><div class="footer" id="footerText">
OFFICIAL SINGING REGISTRATION 2026<br>
© CHASTE DRAGON
</div></div><script>
let currentLang = "id";

function toggleLang(){
  if(currentLang === "id"){
    currentLang = "en";

    document.getElementById("btnTranslate").innerText = "🌐 Translate: ID";
    document.getElementById("descText").innerText =
      "PLEASE READ AND UNDERSTAND ALL RULES BEFORE REGISTERING. By registering, you agree to join the Walla / Heesay singing event.";
    document.getElementById("rulesBtn").innerText = "📜 Baca Aturan";
    document.getElementById("lblAdmin").innerText = "Pilih Admin";
    document.getElementById("lblNama").innerText = "Nama Lengkap Peserta";
    document.getElementById("lblUmur").innerText = "Umur Para Peserta";
    document.getElementById("lblAsal").innerText = "Asal Kota";
    document.getElementById("lblGroup").innerText = "Nama Group";
    document.getElementById("lblJumlah").innerText = "Berapa Orang Di Dalam Group?";
    document.getElementById("lblMember").innerText = "Nama Member Group";
    document.getElementById("lblLagu").innerText = "Lagu apa yang akan kamu nyanyikan?";
    document.getElementById("lblLink").innerText = "Walla-Heesay Account Link";
    document.getElementById("infoGroup").innerText =
      "(information: Grup Bernyanyi, jika kamu belum memilikinya, silakan buat grup)";
    document.getElementById("lblAgree").innerText =
      "Saya menyatakan sudah membaca dan menyetujui seluruh peraturan.";
    document.getElementById("btnSubmit").innerText =
      "KIRIM PENDAFTARAN VIA WHATSAPP";

  } else {
    currentLang = "id";

    document.getElementById("btnTranslate").innerText = "🌐 Translate: EN";
    document.getElementById("descText").innerText =
      "MOHON MEMBACA DAN MEMAHAMI SELURUH PERATURAN SEBELUM MENDAFTAR. Dengan mendaftar berarti Anda siap mengikuti event singing di Walla / Heesay.";
    document.getElementById("rulesBtn").innerText = "📜 Ready The Rules";
    document.getElementById("lblAdmin").innerText = "Select Admin";
    document.getElementById("lblNama").innerText = "Full Name";
    document.getElementById("lblUmur").innerText = "Age";
    document.getElementById("lblAsal").innerText = "From";
    document.getElementById("lblGroup").innerText = "Name Group Sing";
    document.getElementById("lblJumlah").innerText = "How many people are there in the group?";
    document.getElementById("lblMember").innerText = "Name Member Group";
    document.getElementById("lblLagu").innerText = "What song will you sing?";
    document.getElementById("lblLink").innerText = "Link Account Walla-Heesay";
    document.getElementById("infoGroup").innerText =
      "(information: Your Group Sing, if don't have make sure to create and make group sing)";
    document.getElementById("lblAgree").innerText =
      "I confirm that I have read and agree to all the rules";
    document.getElementById("btnSubmit").innerText =
      "SEND REGISTRATION VIA WHATSAPP";
  }
}

// ===== submit WA =====
document.getElementById("formWalla").addEventListener("submit", function(e){
  e.preventDefault();

  if(!document.getElementById("setuju").checked){
    alert(currentLang === "id"
      ? "Anda harus menyetujui peraturan terlebih dahulu!"
      : "You must agree to the rules first!");
    return;
  }

  let admin = document.getElementById("admin").value;
  let nama = document.getElementById("nama").value;
  let umur = document.getElementById("umur").value;
  let asal = document.getElementById("asal").value;
  let groupname = document.getElementById("groupname").value;
  let jumlah = document.getElementById("jumlah").value;
  let membergroup = document.getElementById("membergroup").value;
  let lagu = document.getElementById("lagu").value;
  let link = document.getElementById("link").value;
  let linkgroup = document.getElementById("linkgroup").value;

  let pesan = `Halo Admin, saya ingin mendaftar Singing Event WALLA / HEESAY.\n\nFull Name: ${nama}\nAge: ${umur}\nFrom: ${asal}\nName Group Sing: ${groupname}\nTotal Members: ${jumlah}\nName Member Group: ${membergroup}\nSong: ${lagu}\nLink Account: ${link}\nLink Group Sing: ${linkgroup}`;

  let url = "https://wa.me/" + admin + "?text=" + encodeURIComponent(pesan);
  window.open(url, "_blank");
});
</script><br><br> <a href="sing-walla-heesay.html" style="color:gold;">⬅ Kembali/Back</a>

</body>
</html>
