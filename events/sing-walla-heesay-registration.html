<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINGING REGISTRATION - WALLA / HEESAY</title>

<style>
body{
  background:black;
  color:white;
  font-family:Poppins, Arial, sans-serif;
  padding:40px;
  line-height:1.6;
}

h1,h2{
  color:gold;
  text-align:center;
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  background:#111;
  padding:30px;
  border-radius:15px;
  border:2px solid gold;
  box-shadow:0 0 25px rgba(255,215,0,0.35);
}

.translate-btn{
  display:block;
  margin:20px auto;
  padding:10px 22px;
  border-radius:30px;
  border:1px solid gold;
  background:transparent;
  color:gold;
  font-weight:bold;
  cursor:pointer;
}

.translate-btn:hover{
  background:gold;
  color:black;
}

.form-box{
  border:1px solid gold;
  border-radius:12px;
  padding:20px;
  margin-top:25px;
  background:#000;
}

label{
  display:block;
  margin-top:12px;
  font-weight:bold;
  color:gold;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:16px;
  border-radius:8px;
  border:1px solid gold;
  background:black;
  color:white;
  font-size:14px;
}

/* CHECKBOX RAPAT */
.checkbox-area{
  margin:20px 0;
  background:#000;
  padding:15px;
  border-radius:10px;
  border:1px solid gold;
}

.checkbox-area input[type="checkbox"]{
  width:auto;
  margin-right:8px;
  vertical-align:top;
  cursor:pointer;
}

.checkbox-area label{
  color:gold;
  font-weight:bold;
  cursor:pointer;
}

button.submit-btn{
  width:100%;
  padding:14px;
  background:linear-gradient(90deg,gold,orange);
  color:black;
  font-weight:bold;
  border:none;
  border-radius:40px;
  cursor:pointer;
  font-size:16px;
}

.footer{
  margin-top:35px;
  text-align:center;
  color:gold;
  font-weight:bold;
}

@media(max-width:600px){
  body{ padding:20px; }
}
</style>
</head>

<body>

<div class="container">

<h1 id="title1">🎤 SINGING REGISTRATION</h1>
<h2>CHASTE DRAGON SQUAD</h2>
<h2>WALLA / HEESAY DIVISION</h2>

<button class="translate-btn" onclick="changeLang()" id="btnTranslate">
🌐 Language: ID
</button>

<div class="form-box">
<form id="formWalla">

<label id="lblNama">Nama Lengkap</label>
<input type="text">

<label id="lblUmur">Umur</label>
<input type="number">

<label id="lblAsal">Asal</label>
<input type="text">

<label id="lblLagu">Lagu yang akan dinyanyikan</label>
<input type="text">

<div class="checkbox-area">
  <input type="checkbox" id="agree">
  <label for="agree" id="lblAgree">Saya menyetujui seluruh peraturan.</label>
</div>

<button type="submit" class="submit-btn" id="btnSubmit">
KIRIM PENDAFTARAN
</button>

</form>
</div>

<div class="footer">
OFFICIAL SINGING REGISTRATION 2026<br>
© CHASTE DRAGON
</div>

</div>

<script>
const langs = ["id","en","cn","kr","vn","ph","th"];
let indexLang = 0;

const text = {
id:{
nama:"Nama Lengkap",
umur:"Umur",
asal:"Asal",
lagu:"Lagu yang akan dinyanyikan",
agree:"Saya menyetujui seluruh peraturan.",
submit:"KIRIM PENDAFTARAN"
},
en:{
nama:"Full Name",
umur:"Age",
asal:"From",
lagu:"Song to perform",
agree:"I agree to all rules.",
submit:"SEND REGISTRATION"
},
cn:{
nama:"全名",
umur:"年龄",
asal:"来自",
lagu:"演唱歌曲",
agree:"我已阅读并同意所有规则。",
submit:"提交报名"
},
kr:{
nama:"이름",
umur:"나이",
asal:"출신",
lagu:"부를 노래",
agree:"모든 규칙에 동의합니다.",
submit:"신청 보내기"
},
vn:{
nama:"Họ tên",
umur:"Tuổi",
asal:"Đến từ",
lagu:"Bài hát trình bày",
agree:"Tôi đồng ý với tất cả quy định.",
submit:"GỬI ĐĂNG KÝ"
},
ph:{
nama:"Buong Pangalan",
umur:"Edad",
asal:"Mula sa",
lagu:"Kantang kakantahin",
agree:"Sumasang-ayon ako sa lahat ng patakaran.",
submit:"IPADALA ANG REGISTRATION"
},
th:{
nama:"ชื่อเต็ม",
umur:"อายุ",
asal:"มาจาก",
lagu:"เพลงที่จะร้อง",
agree:"ฉันยอมรับกฎทั้งหมด",
submit:"ส่งสมัคร"
}
};

function applyLang(){
  const t = text[langs[indexLang]];
  document.getElementById("btnTranslate").innerText =
    "🌐 Language: " + langs[indexLang].toUpperCase();
  document.getElementById("lblNama").innerText = t.nama;
  document.getElementById("lblUmur").innerText = t.umur;
  document.getElementById("lblAsal").innerText = t.asal;
  document.getElementById("lblLagu").innerText = t.lagu;
  document.getElementById("lblAgree").innerText = t.agree;
  document.getElementById("btnSubmit").innerText = t.submit;
}

function changeLang(){
  indexLang = (indexLang + 1) % langs.length;
  applyLang();
}

applyLang();
</script>

</body>
</html>
